<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cualli | Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <a href="index.html"><img src="./assets/cualli_logo.webp" alt="Cualli Logo" class="logo"></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="science.html">Science</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <header class="section text-center reveal active" style="padding-top: 160px; padding-bottom: 40px;">
        <h1 style="font-size: clamp(3rem, 6vw, 4.5rem); margin-bottom: 20px;">Let's <span class="gradient-text">Connect.</span></h1>
        <p style="margin: 0 auto; max-width: 600px; font-size: 1.2rem;">
            Interested in partnership opportunities, investment, or learning more about our clinical timeline? Reach out to our team below.
        </p>
    </header>

    <section class="section reveal" style="padding-top: 0;">
        <div class="card" style="max-width: 700px; margin: 0 auto; background: var(--surface-color);">
            <form action="#" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="jane@company.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" placeholder="How can we help you?" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Send Message</button>
            </form>
        </div>
    </section>

    <footer><p>&copy; 2026 Cualli, LLC. All rights reserved.</p></footer>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                if (reveals[i].getBoundingClientRect().top < window.innerHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
    </script>
</body>
</html>
